<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
body{
margin:0;
background:black;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
flex-direction:column;
}
button{
font-size:20px;
padding:15px 30px;
}
video{
display:none;
width:100%;
max-width:800px;
}
</style>
</head>

<body>

<button onclick="playVideo()">Press O Here</button>

<video id="vid" controls>
<source src="video.mp4" type="video/mp4">
</video>

<script>
function playVideo(){
const v = document.getElementById("vid");
v.style.display="block";
v.play();
}
</script>

</body>
</html>
