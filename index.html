```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Scanning...</title>

<style>

body{
background:black;
color:#00ff9c;
font-family:monospace;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
flex-direction:column;
margin:0;
overflow:hidden;
}

#text{
font-size:22px;
margin-bottom:20px;
}

#bar{
width:300px;
height:20px;
border:1px solid #00ff9c;
margin-bottom:20px;
}

#progress{
height:100%;
width:0%;
background:#00ff9c;
}

video{
display:none;
width:90%;
max-width:800px;
}

#rick{
display:none;
font-size:40px;
margin-top:20px;
animation:glitch 0.3s infinite;
}

#btn{
display:none;
margin-top:20px;
padding:12px 30px;
background:black;
border:2px solid #00ff9c;
color:#00ff9c;
font-family:monospace;
font-size:18px;
cursor:pointer;
}

#btn:hover{
background:#00ff9c;
color:black;
}

@keyframes glitch{
0%{transform:translate(0,0)}
25%{transform:translate(-3px,3px)}
50%{transform:translate(3px,-3px)}
75%{transform:translate(-3px,-3px)}
100%{transform:translate(0,0)}
}

.shake{
animation:shake 0.2s infinite;
}

@keyframes shake{
0%{transform:translate(2px,2px)}
25%{transform:translate(-2px,-2px)}
50%{transform:translate(2px,-2px)}
75%{transform:translate(-2px,2px)}
100%{transform:translate(0,0)}
}

</style>
</head>

<body>

<div id="text">Initializing scan...</div>

<div id="bar">
<div id="progress"></div>
</div>

<video id="vid" controls>
<source src="video.mp4" type="video/mp4">
</video>

<div id="rick">YOU HAVE BEEN RICKROLLED</div>

<button id="btn">CLICK HERE</button>

<script>

let messages=[
"Connecting to device...",
"Scanning photos...",
"Scanning messages...",
"Analyzing personality...",
"Finding embarrassing data...",
"Uploading results..."
];

let progress=0;
let bar=document.getElementById("progress");
let text=document.getElementById("text");

let interval=setInterval(()=>{

progress+=Math.random()*10;
bar.style.width=progress+"%";

text.innerHTML=messages[Math.floor(Math.random()*messages.length)];

if(progress>=100){

clearInterval(interval);

text.innerHTML="Target acquired.";

setTimeout(()=>{

document.getElementById("bar").style.display="none";
text.style.display="none";

let vid=document.getElementById("vid");
vid.style.display="block";
vid.play();

},1200);

}

},200);


let video=document.getElementById("vid");

video.onended=function(){

document.body.classList.add("shake");

let rick=document.getElementById("rick");
rick.style.display="block";

let btn=document.getElementById("btn");
btn.style.display="block";

};


document.getElementById("btn").onclick=function(){

document.body.style.background="red";

document.getElementById("rick").innerHTML="SYSTEM FAILURE";

setTimeout(()=>{

document.body.style.background="black";
document.body.classList.remove("shake");

video.currentTime=0;
video.play();

document.getElementById("rick").style.display="none";
document.getElementById("btn").style.display="none";

},1500);

};

</script>

</body>
</html>
```
